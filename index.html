<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>지뢰찾기</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>지뢰찾기</h1>
      <div class="header-controls">
        <select id="difficulty-select">
          <option value="beginner">초급 (9x9, 10)</option>
          <option value="intermediate">중급 (16x16, 40)</option>
          <option value="expert">고급 (16x30, 99)</option>
        </select>
        <button id="dark-mode-toggle" type="button" title="다크모드 전환">🌙</button>
      </div>
    </header>

    <div class="status-bar">
      <div class="mine-count">💣 <span id="mine-count">010</span></div>
      <button id="new-game-btn" type="button" title="새 게임">🙂</button>
      <div class="timer">⏱ <span id="timer">000</span></div>
    </div>

    <div id="best-time" class="best-time">최고 기록: -</div>

    <div id="board" class="board"></div>
  </div>

  <div id="result-modal" class="modal hidden">
    <div class="modal-content">
      <h2 id="modal-title"></h2>
      <p id="modal-message"></p>
      <button id="modal-close-btn" type="button">확인</button>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
